<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoya AI - Advanced Coding Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0f19; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        .chat-container { height: calc(100vh - 180px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .glowing-mic { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        pre { background-color: #1e2538 !important; border-left: 4px solid #3b82f6; padding: 12px; overflow-x: auto; font-family: monospace; color: #38bdf8; margin: 0; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="bg-[#111827] border-b border-gray-800 p-4 text-center shadow-lg">
        <h1 class="text-2xl font-bold text-blue-500 tracking-wide flex items-center justify-center gap-2">
            <i class="fa-solid px-2 fa-robot text-cyan-400"></i> ZOYA AI <span class="text-xs bg-blue-900/50 text-blue-300 px-2 py-0.5 rounded border border-blue-700">1.5 PRO DEVELOPER</span>
        </h1>
        <p class="text-xs text-gray-400 mt-1">Advanced Python, App & Algo Trading Specialist</p>
    </header>

    <main class="flex-1 max-w-4xl w-full mx-auto p-4 flex flex-col justify-between">
        <div id="chat-box" class="chat-container overflow-y-auto space-y-4 p-2">
            <div class="flex gap-3 items-start bg-gray-900/40 p-4 rounded-xl border border-gray-800/60">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-600 to-cyan-400 flex items-center justify-center text-white shrink-0">
                    <i class="fa-solid fa-user-astronaut text-sm"></i>
                </div>
                <div class="w-full">
                    <p class="font-semibold text-blue-400 text-sm">Zoya</p>
                    <p class="text-gray-300 mt-1 text-sm md:text-base">Pranam Boss! Maine apni aawaz ko thoda aur natural aur soft kar liya hai. Ab meri aawaz pehle se behtar aayegi!</p>
                </div>
            </div>
        </div>

        <div class="mt-4 bg-[#111827] border border-gray-800 rounded-2xl p-3 shadow-xl">
            <div class="flex items-center gap-2">
                <button id="mic-btn" class="w-12 h-12 rounded-xl bg-blue-600 hover:bg-blue-500 active:scale-95 flex items-center justify-center transition text-white cursor-pointer shadow-md">
                    <i id="mic-icon" class="fa-solid fa-microphone text-lg"></i>
                </button>
                <input id="user-input" type="text" placeholder="Zoya se code likhwayein ya baat karein..." class="flex-1 bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm md:text-base text-gray-100 focus:outline-none focus:border-blue-500">
                <button id="send-btn" class="w-12 h-12 rounded-xl bg-gray-800 hover:bg-gray-700 active:scale-95 flex items-center justify-center transition text-blue-400 cursor-pointer">
                    <i class="fa-solid fa-paper-plane text-lg"></i>
                </button>
            </div>
            <div id="status-text" class="text-xs text-gray-500 mt-1.5 px-1 text-center">Status: Ready</div>
        </div>
    </main>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const API_KEY = "AQ.Ab8RN6LKyNXF1j0LhXB3EaTFrew5kkOiSusg9_H8arevk2AStg"; 
        const MODEL_NAME = "gemini-1.5-pro";

        const ai = new GoogleGenerativeAI(API_KEY);
        const model = ai.getGenerativeModel({
            model: MODEL_NAME,
            systemInstruction: "You are Zoya, a brilliant, friendly, and expert advanced AI Coding Assistant created for 'Boss'. You talk in a helpful mixture of Hindi and English (Hinglish). You specialize in writing flawless Python code, creating complex web/mobile apps, building AI Agents, and designing algo-trading scripts. Always format code blocks inside proper markdown triple backticks with language specifications so they look completely structured and readable. Keep explanations concise."
        });

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        const micIcon = document.getElementById('mic-icon');
        const statusText = document.getElementById('status-text');

        // VOICE OPTIMIZATION LOGIC
        let zoyaBestVoice = null;
        function loadBestVoice() {
            const voices = window.speechSynthesis.getVoices();
            if(voices.length === 0) return;
            // Phele Google ki premium Hindi/Indian female awaz dhundo
            zoyaBestVoice = voices.find(v => v.name.includes('Google') && v.lang.includes('hi-IN')) || 
                            voices.find(v => v.lang === 'hi-IN') || 
                            voices.find(v => v.lang === 'en-IN');
        }
        window.speechSynthesis.onvoiceschanged = loadBestVoice;
        loadBestVoice(); // Fallback initial call

        const messageMemory = {}; 
        let currentSpeakingId = null;

        chatBox.addEventListener('click', async (e) => {
            
            const copyBtn = e.target.closest('.copy-btn');
            if (copyBtn) {
                const codeElement = copyBtn.parentElement.nextElementSibling.querySelector('code');
                if (codeElement) {
                    try {
                        const textArea = document.createElement('textarea');
                        textArea.innerHTML = codeElement.innerHTML;
                        await navigator.clipboard.writeText(textArea.value);
                        
                        const originalHTML = copyBtn.innerHTML;
                        copyBtn.innerHTML = '<i class="fa-solid fa-check mr-1"></i>Copied!';
                        copyBtn.classList.replace('bg-blue-600', 'bg-green-600');
                        copyBtn.classList.replace('hover:bg-blue-500', 'hover:bg-green-500');
                        
                        setTimeout(() => {
                            copyBtn.innerHTML = originalHTML;
                            copyBtn.classList.replace('bg-green-600', 'bg-blue-600');
                            copyBtn.classList.replace('hover:bg-green-500', 'hover:bg-blue-500');
                        }, 2000);
                    } catch (err) { alert('Copy failed.'); }
                }
                return;
            }

            const ttsBtn = e.target.closest('.tts-btn');
            if (ttsBtn) {
                const id = ttsBtn.getAttribute('data-id');
                const icon = ttsBtn.querySelector('i');

                if (window.speechSynthesis.speaking && currentSpeakingId === id) {
                    window.speechSynthesis.cancel();
                    icon.className = 'fa-solid fa-volume-high';
                    currentSpeakingId = null;
                    return;
                }

                window.speechSynthesis.cancel();

                let textToSpeak = messageMemory[id] || "";
                if(!textToSpeak) return;

                textToSpeak = textToSpeak.replace(/```[\s\S]*?```/g, ' Yahan maine code likha hai, jise aap box mein dekh sakte hain. ');
                textToSpeak = textToSpeak.replace(/[*#_]/g, '');

                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'hi-IN';
                // Aawaz ko thoda natural banane ke liye settings
                utterance.pitch = 1.1; // Thoda soft sur
                utterance.rate = 0.95; // Thodi aaram se bolegi
                
                if(zoyaBestVoice) {
                    utterance.voice = zoyaBestVoice;
                }

                utterance.onstart = () => {
                    document.querySelectorAll('.tts-btn i').forEach(i => i.className = 'fa-solid fa-volume-high text-gray-400');
                    icon.className = 'fa-solid fa-stop text-red-500 glowing-mic';
                    currentSpeakingId = id;
                };

                utterance.onend = () => {
                    icon.className = 'fa-solid fa-volume-high';
                    icon.classList.remove('text-red-500', 'glowing-mic');
                    currentSpeakingId = null;
                };

                utterance.onerror = () => {
                    icon.className = 'fa-solid fa-volume-high';
                    currentSpeakingId = null;
                };

                window.speechSynthesis.speak(utterance);
            }
        });

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'hi-IN';

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('glowing-mic', 'bg-red-600');
                micBtn.classList.remove('bg-blue-600');
                micIcon.className = 'fa-solid fa-stop text-lg';
                statusText.innerText = "Status: Boss ki aawaz sun rahi hoon...";
            };

            recognition.onend = () => {
                isListening = false;
                micBtn.classList.remove('glowing-mic', 'bg-red-600');
                micBtn.classList.add('bg-blue-600');
                micIcon.className = 'fa-solid fa-microphone text-lg';
                statusText.innerText = "Status: Ready";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                userInput.value = transcript;
                handleSendMessage();
            };
        } else {
            micBtn.style.display = 'none';
            statusText.innerText = "Status: Voice input not supported on this browser.";
        }

        async function handleSendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            if(window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }

            appendMessage("Boss", text, true);
            userInput.value = '';
            statusText.innerText = "Status: Zoya code aur answer likh rahi hai...";

            const responseDivId = appendMessage("Zoya", "Thinking & Coding...", false);

            try {
                const result = await model.generateContent(text);
                const responseText = result.response.text();
                
                messageMemory[responseDivId] = responseText;
                updateMessage(responseDivId, responseText);
                statusText.innerText = "Status: Task Completed!";
            } catch (error) {
                console.error(error);
                updateMessage(responseDivId, "Maaf kijiye Boss, lagta hai connection ya API key mein problem hai.");
                statusText.innerText = "Status: Error occurred.";
            }
        }

        function appendMessage(sender, text, isUser) {
            const id = 'msg-' + Date.now();
            
            const speakerBtnHTML = !isUser 
                ? `<button class="tts-btn ml-3 mt-0.5 text-gray-400 hover:text-blue-400 transition" data-id="${id}" title="Pura padhkar sunao">
                    <i class="fa-solid fa-volume-high"></i>
                   </button>` 
                : '';

            const msgDiv = document.createElement('div');
            msgDiv.className = `flex gap-3 items-start p-4 rounded-xl transition-all ${isUser ? 'bg-blue-950/20 border border-blue-900/30 ml-8' : 'bg-gray-900/40 border border-gray-800 mr-8'}`;
            
            const avatar = isUser 
                ? '<div class="w-8 h-8 rounded-full bg-gray-800 border border-gray-700 flex items-center justify-center text-gray-300 shrink-0"><i class="fa-solid fa-user"></i></div>'
                : '<div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-600 to-cyan-400 flex items-center justify-center text-white shrink-0"><i class="fa-solid fa-user-astronaut"></i></div>';

            msgDiv.innerHTML = `
                ${avatar}
                <div class="w-full overflow-hidden">
                    <div class="flex items-center">
                        <p class="font-semibold text-sm ${isUser ? 'text-gray-400' : 'text-blue-400'}">${sender}</p>
                        ${speakerBtnHTML}
                    </div>
                    <div id="${id}" class="text-gray-200 mt-1 text-sm md:text-base whitespace-pre-wrap">${escapeHTML(text)}</div>
                </div>
            `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        function updateMessage(id, rawText) {
            const target = document.getElementById(id);
            if (!target) return;
            
            let formattedText = rawText;
            const codeBlockRegex = /```([\w-]+)?\s*([\s\S]*?)\s*```/g;
            
            formattedText = formattedText.replace(codeBlockRegex, (match, lang, code) => {
                return `
                <div class="my-4 shadow-lg rounded-lg overflow-hidden border border-gray-700">
                    <div class="bg-gray-800 px-4 py-2 flex justify-between items-center border-l-4 border-blue-500">
                        <span class="text-xs font-semibold text-gray-300 uppercase">${lang || 'code'}</span>
                        <button class="copy-btn bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded-md text-xs transition flex items-center cursor-pointer shadow-sm">
                            <i class="fa-regular fa-copy mr-1.5"></i>Copy
                        </button>
                    </div>
                    <pre><code class="text-sm">${escapeHTML(code)}</code></pre>
                </div>`;
            });

            target.innerHTML = formattedText;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        sendBtn.addEventListener('click', handleSendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSendMessage(); });
        
        micBtn.addEventListener('click', () => {
            if (!recognition) return;
            if (isListening) { recognition.stop(); } 
            else { recognition.start(); }
        });
    </script>
</body>
</html>
