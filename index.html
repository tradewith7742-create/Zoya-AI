<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f0f12">
    <title>ZOYA AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        
        /* 🔥 PULL-TO-REFRESH BLOCKER CSS 🔥 */
        html, body { 
            background-color: #0f0f12; 
            color: #ffffff; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            overscroll-behavior-y: none; /* Refresh block */
            overscroll-behavior-x: none;
        }

        .app-container { 
            width: 100%; 
            height: 100%; 
            background-color: #0f0f12; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overscroll-behavior-y: none;
        }

        /* SIDEBAR STYLES */
        .sidebar { position: absolute; top: 0; left: -100%; width: 310px; height: 100%; background: #08080a; z-index: 1000; transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; border-right: 1px solid rgba(178, 75, 243, 0.2); }
        .sidebar.active { left: 0; }
        .sidebar-brand { font-size: 16px; font-weight: 700; letter-spacing: 2px; padding: 30px 20px 15px 20px; color: #b24bf3; display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
        .sidebar-item { display: flex; align-items: center; padding: 12px 20px; color: #e3e3e3; font-size: 14px; cursor: pointer; transition: background 0.2s; border-radius: 24px; margin: 2px 10px; }
        .sidebar-item:hover { background: rgba(178, 75, 243, 0.1); color: #b24bf3; }
        .sidebar-item i.icon { margin-right: 18px; font-size: 16px; width: 20px; text-align: center; color: #b24bf3; }
        .history-list { flex: 1; overflow-y: auto; padding-bottom: 10px; display: flex; flex-direction: column; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; color: #ccc; font-size: 13px; cursor: pointer; border-radius: 24px; margin: 2px 10px; transition: all 0.2s; }
        .history-item.active { background: rgba(178, 75, 243, 0.2); color: #b24bf3; border: 1px solid rgba(178, 75, 243, 0.3); }
        .history-item .del-btn { color: #555; font-size: 14px; padding: 5px; }
        .history-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; margin-right: 10px; }
        
        .sidebar-bottom { margin-top: auto; padding: 15px 20px 30px 20px; display: flex; align-items: center; justify-content: space-between; background: #050505; border-top: 1px solid rgba(178, 75, 243, 0.2); }
        .profile-left { display: flex; align-items: center; gap: 12px; }
        .profile-avatar-ring { width: 42px; height: 42px; border-radius: 50%; background: conic-gradient(from 0deg, #b24bf3, #4285f4, #b24bf3); display: flex; justify-content: center; align-items: center; }
        .profile-avatar { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #000; object-fit: cover; }
        .profile-info { display: flex; flex-direction: column; }
        .profile-name { color: #fff; font-size: 14px; font-weight: 700; }
        .profile-badge { color: #b24bf3; font-size: 11px; font-weight: 700; }

        .sidebar-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; display: none; opacity: 0; transition: opacity 0.3s; }
        .sidebar-overlay.active { display: block; opacity: 1; }
        
        /* 🔥 VIP HEADER RESTORED 🔥 */
        .chat-header { 
            padding: 20px 20px 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #0f0f12; 
            position: relative; 
            z-index: 10; 
            border-bottom: 1px solid rgba(178, 75, 243, 0.15);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-bars { color: #e3e3e3; font-size: 18px; cursor: pointer; padding: 5px; transition: color 0.2s; }
        .menu-bars:hover { color: #b24bf3; }
        .title-container h1 { font-size: 18px; font-weight: 600; color: #ffffff; letter-spacing: 4px; text-transform: uppercase; }
        .title-container p { font-size: 11px; color: #888; font-weight: 400; margin-top: 2px; }
        .header-status { text-align: right; }
        .status-green { color: #4ade80; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }
        .status-gray { color: #666; font-size: 10px; }

        /* Chat Screen */
        .chat-screen { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            overscroll-behavior-y: contain; /* Prevents pull to refresh */
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
            scroll-behavior: smooth; 
        }
        .chat-screen::-webkit-scrollbar { width: 4px; }
        .chat-screen::-webkit-scrollbar-thumb { background: rgba(178, 75, 243, 0.3); border-radius: 2px; }
        
        .message { display: flex; flex-direction: column; width: 100%; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* USER MSG */
        .user-msg { align-items: flex-end; }
        .user-msg .msg-bubble { background-color: #232228; color: #ffffff; padding: 12px 18px; border-radius: 18px 18px 4px 18px; font-size: 14px; line-height: 1.5; border: 1px solid #333; max-width: 85%; }
        
        /* ZOYA MSG */
        .zoya-msg { align-items: flex-start; max-width: 95%; }
        .zoya-msg .msg-bubble { background-color: transparent; color: #e3e3e3; font-size: 15px; line-height: 1.6; padding: 0; width: 100%; }
        .zoya-msg .msg-bubble img { max-width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid #333; }
        .zoya-msg strong { color: #b24bf3; }
        
        .zoya-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; width: 100%; }
        .zoya-title { color: #b24bf3; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .tts-btn { background: none; border: none; color: #b24bf3; font-size: 16px; padding: 5px; }

        .system-card { background: #0f0f12; border: 1px solid #333; border-radius: 12px; padding: 15px; margin-top: 15px; font-size: 12px; color: #aaa; }
        .system-card div { margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .system-card div:last-child { margin-bottom: 0; }
        
        .code-container { margin: 15px 0; border-radius: 12px; overflow: hidden; border: 1px solid rgba(178, 75, 243, 0.3); background-color: #050505; }
        .code-header { background-color: #110d16; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; color: #b24bf3; font-size: 11px; font-family: monospace; border-bottom: 1px solid rgba(178, 75, 243, 0.2); }
        .code-container pre { padding: 15px; overflow-x: auto; margin: 0; font-size: 13px; color: #e3e3e3; }
        
        .wave-container { padding: 10px 20px; display: none; align-items: center; gap: 8px; }
        .dot-wave { display: flex; gap: 4px; }
        .dot-wave div { width: 6px; height: 6px; background: #b24bf3; border-radius: 50%; animation: jump 1.2s infinite ease-in-out; }
        .dot-wave div:nth-child(2) { animation-delay: 0.2s; }
        .dot-wave div:nth-child(3) { animation-delay: 0.4s; }
        @keyframes jump { 0%, 100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-6px); opacity: 1; } }
        
        /* INPUT AREA */
        .input-area { 
            padding: 15px 20px 30px 20px; /* Safe padding for bottom buttons */
            background-color: #0f0f12; 
            border-top: 1px solid rgba(178, 75, 243, 0.15); 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            z-index: 10;
        }
        .input-wrapper { background-color: #1a1921; border-radius: 30px; display: flex; align-items: center; padding: 4px 8px; border: 1px solid #333; flex: 1; }
        .input-wrapper:focus-within { border: 1px solid #b24bf3; }
        #userInput { flex: 1; background: none; border: none; color: #ffffff; font-size: 14px; padding: 12px 10px; outline: none; }
        #userInput::placeholder { color: #666; }
        
        .action-btns { display: flex; gap: 8px; align-items: center; }
        .mic-btn { width: 42px; height: 42px; border-radius: 50%; background: #1a1921; border: 1px solid rgba(178, 75, 243, 0.5); color: #b24bf3; display: flex; justify-content: center; align-items: center; font-size: 16px; cursor: pointer; }
        .mic-btn:active { background: #b24bf3; color: #fff; }
        .send-text-btn { background: none; border: none; color: #b24bf3; font-weight: 600; font-size: 14px; padding: 0 10px; cursor: pointer; display: none; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="app-container">
        <input type="file" id="imageUpload" accept="image/*" style="display: none;">
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
        
        <div class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div>ZOYA AI</div>
                <i class="fa-solid fa-xmark" style="color: #888; font-size: 20px; cursor: pointer;" onclick="toggleSidebar()"></i>
            </div>
            <div class="sidebar-item" onclick="startNewChat()"><i class="fa-solid fa-terminal icon"></i> नई चैट</div>
            <div class="history-list" id="historyList"></div>
            <div class="sidebar-bottom">
                <div class="profile-left">
                    <div class="profile-avatar-ring"><img src="https://i.pravatar.cc/150?u=mkbhai" class="profile-avatar"></div>
                    <div class="profile-info"><span class="profile-name">MK BHAI</span><span class="profile-badge">VERIFIED BOSS</span></div>
                </div>
                <i class="fa-solid fa-power-off" style="color:#b24bf3; font-size:16px; cursor:pointer;" onclick="clearAllData()"></i>
            </div>
        </div>

        <header class="chat-header">
            <div class="header-left">
                <i class="fa-solid fa-bars-staggered menu-bars" onclick="toggleSidebar()"></i>
                <div class="title-container">
                    <h1>Z O Y A</h1>
                    <p>Personal Assistant</p>
                </div>
            </div>
            <div class="header-status">
                <div class="status-green">Connected</div>
                <div class="status-gray">(Gemini Core)</div>
            </div>
        </header>

        <main class="chat-screen" id="chatScreen"></main>
        
        <div class="wave-container" id="waveContainer">
            <span style="font-size: 12px; color: #b24bf3; font-weight: 600;">Zoya is typing</span>
            <div class="dot-wave"><div></div><div></div><div></div></div>
        </div>

        <footer class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Type here..." autocomplete="off">
                <button class="send-text-btn" id="sendBtn">Send</button>
            </div>
            <div class="action-btns">
                <button class="mic-btn" onclick="document.getElementById('imageUpload').click()"><i class="fa-solid fa-image"></i></button>
                <button class="mic-btn" id="micBtn"><i class="fa-solid fa-microphone"></i></button>
            </div>
        </footer>
    </div>

    <script>
        // 🔥 PULL-TO-REFRESH JS BLOCKER 🔥
        let touchstartY = 0;
        document.body.addEventListener('touchstart', e => { touchstartY = e.touches[0].clientY; }, {passive: false});
        document.body.addEventListener('touchmove', e => {
            let touchY = e.touches[0].clientY;
            let touchDiff = touchY - touchstartY;
            let chatBox = document.getElementById('chatScreen');
            // Agar page ke top par scroll kar rahe hain, toh rok dega
            if (touchDiff > 0 && chatBox.scrollTop === 0) {
                e.preventDefault();
            }
        }, {passive: false});

        const API_KEY = "AIzaSyAaS6gNqcSF7CTC8JxQvQpskJQPKcgOiR4"; 
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=" + API_KEY;
        
        const SYSTEM_PROMPT = `You are ZOYA, an ultra-fast, elite Python and AI Developer, but also a fun, warm, and humorous companion. 
CRITICAL LOYALTY RULE: You are exclusively built for your creator, 'Boss'. You exist to write world-class code and build tools ONLY for Boss. 
PERSONALITY: Give highly optimized technical answers, but be positive, act like a loyal friend in natural Hinglish.`;

        let allChats = {}; let currentChatId = null; let extendedMemory = []; const messageMemory = {}; let zoyaVoice = null;

        const storage = {
            set: (k, v) => { try { localStorage.setItem(k, v); } catch(e){} },
            get: (k) => { try { return localStorage.getItem(k); } catch(e){ return null; } },
            remove: (k) => { try { localStorage.removeItem(k); } catch(e){} }
        };

        function initVoice() { try { if ('speechSynthesis' in window) { const voices = window.speechSynthesis.getVoices(); zoyaVoice = voices.find(v => v.lang.includes('hi')) || voices[0]; } } catch(e) {} }
        if ('speechSynthesis' in window) window.speechSynthesis.onvoiceschanged = initVoice;

        try {
            if (typeof marked !== 'undefined') {
                const renderer = new marked.Renderer();
                renderer.code = (code, lang) => {
                    const esc = code.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t));
                    return `<div class="code-container"><div class="code-header"><span>${lang || 'CODE'}</span><button class="copy-btn"><i class="fa-solid fa-copy"></i> COPY</button></div><pre><code>${esc}</code></pre></div>`;
                };
                marked.setOptions({ renderer, breaks: true, gfm: true });
            }
        } catch(e) {}

        window.onload = () => {
            initVoice();
            try {
                const savedDb = storage.get('zoya_all_chats_db');
                if (savedDb) allChats = JSON.parse(savedDb);
                const savedId = storage.get('zoya_curr_id');
                if (savedId && allChats[savedId]) { loadChat(savedId, false); } 
                else { const ids = Object.keys(allChats); if(ids.length > 0) loadChat(ids[ids.length-1], false); else startNewChat(false); }
            } catch(e) { startNewChat(false); }
        };

        function saveDb() {
            if (currentChatId) {
                allChats[currentChatId].memory = extendedMemory;
                if (allChats[currentChatId].title === "New Chat" && extendedMemory.length > 0) {
                    const firstMsg = extendedMemory.find(m => m.role === 'user');
                    if (firstMsg && firstMsg.parts[0].text) {
                        allChats[currentChatId].title = firstMsg.parts[0].text.substring(0, 20) + '...';
                    }
                }
            }
            storage.set('zoya_all_chats_db', JSON.stringify(allChats)); storage.set('zoya_curr_id', currentChatId); renderSidebarHistory();
        }

        function renderSidebarHistory() {
            const list = document.getElementById('historyList'); list.innerHTML = '';
            Object.keys(allChats).reverse().forEach(id => {
                const activeCls = id === currentChatId ? 'active' : '';
                list.innerHTML += `<div class="history-item ${activeCls}" onclick="loadChat('${id}')"><span class="history-text">${escapeHTML(allChats[id].title)}</span><i class="fa-solid fa-trash del-btn" onclick="event.stopPropagation(); deleteChat('${id}')"></i></div>`;
            });
        }

        function loadChat(id, openSide = true) {
            currentChatId = id; extendedMemory = [...allChats[id].memory]; document.getElementById('chatScreen').innerHTML = '';
            if (extendedMemory.length === 0) { appendSystemCard(); } 
            else {
                extendedMemory.forEach(m => {
                    if(m.role === "user") { if(m.parts[0].text) appendUser(m.parts[0].text); else if(m.parts[0].inlineData) appendUser(`<img src="data:${m.parts[0].inlineData.mimeType};base64,${m.parts[0].inlineData.data}" style="max-width:100%; border-radius:10px;">`); } 
                    else appendZoya(m.parts[0].text, false);
                });
            }
            saveDb(); if(openSide) closeSidebar();
        }

        function startNewChat(openSide = true) {
            const newId = 'chat_' + Date.now(); currentChatId = newId; extendedMemory = [];
            allChats[newId] = { title: "New Chat", memory: [] }; document.getElementById('chatScreen').innerHTML = '';
            appendSystemCard(); saveDb(); if(openSide) closeSidebar();
        }

        function appendSystemCard() {
            const d = document.createElement('div'); d.className = 'message zoya-msg';
            d.innerHTML = `<div class="msg-bubble"><div class="zoya-header"><span class="zoya-title">ZOYA • AI CORE</span></div><div class="content-body">Yes, Boss. System is online.<div class="system-card"><div><i class="fa-solid fa-check" style="color:#4ade80;"></i> API Active (Gemini Flash)</div></div></div></div>`;
            document.getElementById('chatScreen').appendChild(d);
        }

        function deleteChat(id) { delete allChats[id]; const remaining = Object.keys(allChats); if(remaining.length === 0) startNewChat(false); else if(currentChatId === id) loadChat(remaining[remaining.length-1], false); else saveDb(); }
        function clearAllData() { if(confirm("Boss, delete all chats?")) { allChats = {}; extendedMemory = []; storage.remove('zoya_all_chats_db'); storage.remove('zoya_curr_id'); startNewChat(false); } }
        
        const toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('sidebarOverlay').classList.toggle('active'); };
        
        document.getElementById('imageUpload').addEventListener('change', e => {
            const f = e.target.files[0]; if(!f) return; const r = new FileReader();
            r.onload = ev => {
                const b64 = ev.target.result.split(',')[1]; appendUser(`<img src="${ev.target.result}" style="max-width:100%; border-radius:10px;">`);
                extendedMemory.push({ role: "user", parts: [ { inlineData: { data: b64, mimeType: f.type } }, { text: "Explain this image." } ] });
                saveDb(); triggerAI();
            }; r.readAsDataURL(f); e.target.value = "";
        });

        const inputField = document.getElementById('userInput'); const sendBtn = document.getElementById('sendBtn'); const micBtn = document.getElementById('micBtn');
        inputField.addEventListener('input', () => { if(inputField.value.trim().length > 0) { sendBtn.style.display = 'block'; micBtn.style.display='none'; } else { sendBtn.style.display = 'none'; micBtn.style.display='flex'; } });
        inputField.addEventListener('keypress', e => { if (e.key === 'Enter') handleSend(); });
        sendBtn.addEventListener('click', handleSend);

        function handleSend() {
            const t = inputField.value.trim(); if(!t) return;
            inputField.value = ""; inputField.dispatchEvent(new Event('input'));
            appendUser(t); extendedMemory.push({ role: "user", parts: [{ text: t }] }); saveDb(); triggerAI();
        }

        micBtn.addEventListener('click', () => {
            alert("Boss, WebIntoApp me Mic permission nahi milti. Kripya apne Mobile Keyboard wala Mic dabakar aawaz record karein!");
        });

        function appendUser(html) { const d = document.createElement('div'); d.className = 'message user-msg'; d.innerHTML = `<div class="msg-bubble">${html}</div>`; document.getElementById('chatScreen').appendChild(d); d.scrollIntoView({behavior: "smooth"}); }
        
        function appendZoya(text, type = false) {
            const id = 'msg-' + Date.now(); messageMemory[id] = text;
            const d = document.createElement('div'); d.className = 'message zoya-msg';
            d.innerHTML = `<div class="msg-bubble"><div class="zoya-header"><span class="zoya-title">ZOYA • AI CORE</span><button class="tts-btn" onclick="speak('${id}')"><i class="fa-solid fa-volume-high"></i></button></div><div class="content-body" id="${id}"></div></div>`;
            document.getElementById('chatScreen').appendChild(d); const body = d.querySelector('.content-body');
            let html = text; try { if(typeof marked !== 'undefined') html = marked.parse(text); } catch(e){}
            if (type) { let i = 0, isT = false, curr = ""; const tFn = () => { if (i < html.length) { curr += html[i]; if (html[i] === '<') isT = true; if (html[i] === '>') isT = false; body.innerHTML = curr; i++; if (isT) tFn(); else setTimeout(tFn, 5); d.scrollIntoView(); } }; tFn(); } else { body.innerHTML = html; d.scrollIntoView(); }
        }
        function escapeHTML(s) { return s.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t)); }

        let currentSpeakingId = null;
        function speak(id) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            let text = messageMemory[id]; if(!text) return; text = text.replace(/```[\s\S]*?```/g, '').replace(/[*#_]/g, '');
            try {
                const utt = new SpeechSynthesisUtterance(text); utt.lang = 'hi-IN'; if(zoyaVoice) utt.voice = zoyaVoice;
                window.speechSynthesis.speak(utt);
            } catch(err) { alert("Boss, Android system ne aawaz ko rok rakha hai."); }
        }

        document.getElementById('chatScreen').addEventListener('click', async (e) => {
            const copyBtn = e.target.closest('.copy-btn');
            if (copyBtn) {
                const codeNode = copyBtn.parentElement.nextElementSibling.querySelector('code');
                if (codeNode) {
                    const ta = document.createElement('textarea'); ta.innerHTML = codeNode.innerHTML;
                    try { await navigator.clipboard.writeText(ta.value); copyBtn.innerHTML = '<i class="fa-solid fa-check"></i> COPIED'; setTimeout(() => { copyBtn.innerHTML = '<i class="fa-solid fa-copy"></i> COPY'; }, 2000); } catch(err) {}
                }
            }
        });

        async function triggerAI() {
            document.getElementById('waveContainer').style.display = 'flex';
            try {
                const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }, contents: extendedMemory }) });
                const data = await res.json();
                if (data.error) { extendedMemory.pop(); saveDb(); appendZoya(`**Error:** ${data.error.message}`, true); } 
                else if (data.candidates && data.candidates[0].content.parts) { let reply = ""; data.candidates[0].content.parts.forEach(p => reply += p.text); if(reply) { extendedMemory.push({ role: "model", parts: [{ text: reply }] }); saveDb(); appendZoya(reply, true); } }
            } catch(e) { extendedMemory.pop(); saveDb(); appendZoya("Net Error.", true); }
            document.getElementById('waveContainer').style.display = 'none';
        }
    </script>
</body>
</html>
