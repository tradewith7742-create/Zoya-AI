<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZOYA AI - Rock Solid Flash</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #000; color: #fff; height: 100dvh; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; height: 100dvh; background-color: #131314; display: flex; flex-direction: column; }
        .chat-header { padding: 15px; font-weight: bold; color: #b388ff; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .chat-screen { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .zoya-msg { align-items: flex-start; display: flex; gap: 10px; }
        .zoya-avatar { width: 30px; height: 30px; border-radius: 50%; background: #5c40d6; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .msg-bubble { background: transparent; font-size: 15px; line-height: 1.6; }
        .input-area { padding: 15px; background: #131314; }
        .input-wrapper { background: #1e1f20; border-radius: 30px; display: flex; align-items: center; padding: 5px 15px; }
        #userInput { flex: 1; background: none; border: none; color: #fff; padding: 10px; outline: none; }
        .code-container { background: #1e1f20; border-radius: 8px; margin: 10px 0; border: 1px solid #3c4043; padding: 10px; font-family: monospace; color: #ff9e80; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="chat-header">
            <span>ZOYA AI - FLASH STABLE</span>
            <i class="fa-solid fa-book" onclick="alert('Notebook active!')"></i>
        </header>
        <main class="chat-screen" id="chatScreen"></main>
        <footer class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Message...">
                <button id="sendBtn" style="background:none; border:none; color:#b388ff; cursor:pointer;"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </footer>
    </div>
    <script>
        // API KEY
        const API_KEY = "AIzaSyCEHzQOBtCdZZTtRN3VRwuTX8D9wwH0dg8"; 
        // 🔥 STABLE MODEL: FLASH (Google ka sabse reliable free model) 🔥
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY;

        const chatScreen = document.getElementById('chatScreen');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function appendMessage(text, isUser) {
            const d = document.createElement('div');
            d.className = isUser ? "message" : "message zoya-msg";
            if(!isUser) {
                d.innerHTML = `<div class="zoya-avatar"><i class="fa-solid fa-robot"></i></div><div class="msg-bubble">${marked.parse(text)}</div>`;
            } else {
                d.innerHTML = `<div class="msg-bubble" style="background:#282a2c; padding:10px; border-radius:15px; align-self:flex-end;">${text}</div>`;
            }
            chatScreen.appendChild(d);
            chatScreen.scrollTop = chatScreen.scrollHeight;
        }

        async function askZoya() {
            const text = userInput.value.trim();
            if(!text) return;
            appendMessage(text, true);
            userInput.value = "";
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                const data = await response.json();
                if(data.candidates) {
                    appendMessage(data.candidates[0].content.parts[0].text, false);
                } else {
                    appendMessage("Limit full ho gayi Boss, thoda wait kijiye!", false);
                }
            } catch(e) {
                appendMessage("Error: " + e.message, false);
            }
        }
        sendBtn.onclick = askZoya;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') askZoya(); };
    </script>
</body>
</html>
